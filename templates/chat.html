<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Чат с БД</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1b26;
            color: #c0caf5;
        }
        .header {
            padding: 12px 20px;
            background: #16161e;
            border-bottom: 1px solid #363b54;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        .status {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .status.connected { background: #1b4332; color: #95d5b2; }
        .status.disconnected { background: #5c2a2a; color: #f8b4b4; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
        }
        .msg.user {
            align-self: flex-end;
            background: #3d59a1;
            color: #c0caf5;
        }
        .msg.bot {
            align-self: flex-start;
            background: #24283b;
            border: 1px solid #363b54;
        }
        .msg .time { font-size: 0.75rem; opacity: 0.7; margin-top: 4px; }
        .input-area {
            padding: 16px 20px;
            background: #16161e;
            border-top: 1px solid #363b54;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #363b54;
            border-radius: 10px;
            background: #24283b;
            color: #c0caf5;
            font-size: 1rem;
        }
        #userInput:focus {
            outline: none;
            border-color: #7aa2f7;
        }
        #sendBtn {
            padding: 12px 20px;
            background: #7aa2f7;
            color: #1a1b26;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        #sendBtn:hover { background: #89b4fa; }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .placeholder-msg {
            text-align: center;
            color: #565f89;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Чат с базой данных</h1>
        <nav class="nav-links" style="display:flex; gap:16px; align-items:center;">
            <a href="/" style="color:#7aa2f7; text-decoration:none;">Чат</a>
            <a href="/data/" style="color:#565f89; text-decoration:none;">Данные таблицы</a>
        </nav>
        <span class="status {{ db_status }}" id="dbStatus">{{ db_status_text }}</span>
    </header>
    <div class="messages" id="messages">
        <div class="placeholder-msg" id="placeholder">Напишите сообщение (ответы ИИ появятся после настройки API ключа).</div>
    </div>
    <div class="input-area">
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Введите сообщение..." autocomplete="off">
            <button type="button" id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const placeholderEl = document.getElementById('placeholder');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser) {
            if (placeholderEl) placeholderEl.remove();
            const div = document.createElement('div');
            div.className = 'msg ' + (isUser ? 'user' : 'bot');
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = '<span>' + escapeHtml(text) + '</span><div class="time">' + time + '</div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(s) {
            const el = document.createElement('div');
            el.textContent = s;
            return el.innerHTML;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;
            fetch('/api/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || ''
                },
                body: JSON.stringify({ message: text })
            })
            .then(r => r.json())
            .then(data => {
                addMessage(data.reply || 'Ответ пока недоступен. Добавьте API ключ для работы с ИИ.', false);
            })
            .catch(() => {
                addMessage('Ошибка отправки. Попробуйте позже.', false);
            })
            .finally(() => { sendBtn.disabled = false; });
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
